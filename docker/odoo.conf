[options]
; Odoo 18 config for the Dockerized stack.
; Listens on the container's 8069 (mapped to host :8169 by docker-compose).

addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; ---- DB connection (matches the postgres service in docker-compose) ----
db_host = postgres
db_port = 5432
db_user = odoo18
db_password = odoo18

; Restrict the manager to ONLY the restored DB so the UI doesn't try
; to create/list other DBs and accidentally touch live data.
db_name = odoo18
dbfilter = ^odoo18$
list_db = False

; ---- Misc ----
admin_passwd = pw-docker-admin-change-me
without_demo = True
proxy_mode = True
log_level = info
