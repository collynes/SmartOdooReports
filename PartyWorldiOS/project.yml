name: PartyWorld
options:
  bundleIdPrefix: com.partyworld
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  PartyWorld:
    type: application
    platform: iOS
    sources:
      - PartyWorld
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.partyworld.insights
        INFOPLIST_FILE: PartyWorld/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
        GENERATE_INFOPLIST_FILE: false
    scheme:
      testTargets:
        - PartyWorldTests
  PartyWorldTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PartyWorldTests
    dependencies:
      - target: PartyWorld
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.partyworld.insights.tests
        GENERATE_INFOPLIST_FILE: true
